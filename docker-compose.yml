services:
  postgres:
    image: postgres:16-alpine
    container_name: node-banana-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banana_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nodebanana}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banana} -d ${POSTGRES_DB:-nodebanana}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: node-banana-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
